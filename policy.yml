# the high level policy
policy:
  approval:
    - or:
        - any approval review
        - requested Codex connector review
  disapproval:
    requires:
      organizations:
        - "Stuhlmuller"

# the list of rules
approval_rules:
  - name: any approval review
    description: "Any GitHub approval review from someone with repository read access satisfies Policy Bot."
    options:
      allow_author: true
      allow_contributor: true
      methods:
        comments: []
        comment_patterns: []
        github_review: true
    requires:
      count: 1
      permissions:
        - read

  - name: requested Codex connector review
    description: "Requests the Codex connector bot for review; its approval review or thumbs-up comment satisfies Policy Bot."
    options:
      allow_author: true
      allow_contributor: true
      request_review:
        enabled: true
        mode: all-users
      methods:
        comments: []
        comment_patterns:
          - '^👍(\s|$)'
        github_review: true
    requires:
      count: 1
      users:
        - "chatgpt-codex-connector[bot]"
