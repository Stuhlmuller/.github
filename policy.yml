# the high level policy
policy:
  approval:
    - or:
        - review bot approved
        - organization member approved
  disapproval:
    requires:
      organizations:
        - "Stuhlmuller"

# the list of rules
approval_rules:
  - name: review bot approved
    description: "Approval from the Codex connector bot via a GitHub review or +1 comment."
    options:
      allow_author: true
      allow_contributor: true
      methods:
        comments:
          - ":+1:"
        comment_patterns:
          - '(^|\s)\+1(\s|$)'
        github_review: true
        body_patterns:
          - '(^|\s)(:\+1:|\+1)(\s|$)'
    requires:
      count: 1
      users:
        - "chatgpt-codex-connector[bot]"
  - name: organization member approved
    description: "Approval from a Stuhlmuller organization member via a GitHub review or +1 comment."
    options:
      allow_author: true
      allow_contributor: true
      methods:
        comments:
          - ":+1:"
        comment_patterns:
          - '(^|\s)\+1(\s|$)'
        github_review: true
    requires:
      count: 1
      organizations:
        - "Stuhlmuller"
