# the high level policy
policy:
  approval:
    - review bot reviewed
  disapproval:
    requires:
      organizations:
        - "Stuhlmuller"

# the list of rules
approval_rules:
  - name: review bot reviewed
    description: "A review signal from the Codex connector bot via an approval review or any bot-authored review/comment."
    options:
      allow_author: true
      allow_contributor: true
      methods:
        comment_patterns:
          - '(?s).*'
        github_review: true
    requires:
      count: 1
      users:
        - "chatgpt-codex-connector[bot]"
