name: PR Agent

on:
  pull_request:
    types: [opened, reopened, ready_for_review, review_requested]
  issue_comment:

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  pr_agent_job:
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: read
    steps:
      - name: Tailscale
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4
        with:
          authkey: ${{ secrets.TS_AUTH_KEY }}
          tags: tag:ci
          statedir: /tmp/tailscale-state/
      - name: PR Agent action step
        id: pragent
        uses: qodo-ai/pr-agent@fdbcecc8cdd9c276919cd9b8f41c981e8ca642ef # main
        env:
          OPENAI__API_BASE: https://litellm.stinkyboi.com/v1
          OPENAI__KEY: ${{ secrets.LITELLM_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          config.model: "gpt-3.5-turbo"
          config.custom_model_max_tokens: 200000